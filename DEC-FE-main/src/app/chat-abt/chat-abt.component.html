<div class="chat-container">
  <!-- Sidebar for Chat History / Prompts -->
  <div class="chat-sidebar border-end">
    <div class="p-4 border-bottom shadow-sm">
      <button class="btn btn-primary w-100 fw-bold d-flex align-items-center justify-content-center gap-2 rounded-3 py-2" style="box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);">
        <i class="bi bi-plus-lg"></i> Nouvelle Discussion
      </button>
    </div>
    <div class="p-3">
      <h6 class="text-muted text-uppercase fw-bold mb-3" style="font-size: 0.8rem; letter-spacing: 0.5px;">Suggestions rapides</h6>
      <div class="d-flex flex-column gap-2">
        <button class="btn btn-light text-start suggestion-btn" (click)="sendPrompt('Générer le rapport mensuel')">
          <i class="bi bi-file-earmark-text text-primary me-2"></i> Générer le rapport mensuel
        </button>
        <button class="btn btn-light text-start suggestion-btn" (click)="sendPrompt('Vérifier les anomalies VUC')">
          <i class="bi bi-shield-check text-success me-2"></i> Vérifier les anomalies VUC
        </button>
        <button class="btn btn-light text-start suggestion-btn" (click)="sendPrompt('Etat des opérations en cours')">
          <i class="bi bi-arrow-repeat text-warning me-2"></i> Etat des opérations en cours
        </button>
      </div>
    </div>
    <div class="mt-auto p-4 d-flex justify-content-center opacity-50">
      <img src="Logo_Attijari_bank-removebg-preview.png" alt="ABT" style="width: 150px; filter: grayscale(100%);">
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="chat-main d-flex flex-column bg-light rounded-4">
    <!-- Header -->
    <div class="chat-header bg-white p-3 border-bottom shadow-sm d-flex align-items-center justify-content-between z-1 rounded-top-4">
      <div class="d-flex align-items-center gap-3 ps-2">
        <div class="chatbot-avatar text-white d-flex align-items-center justify-content-center rounded-circle shadow-sm">
          <i class="bi bi-robot fs-5"></i>
        </div>
        <div>
          <h5 class="m-0 fw-bold text-dark d-flex align-items-center gap-2">
            ChatAbt
            <span class="badge bg-primary bg-opacity-10 text-primary border border-primary px-2 py-1" style="font-size: 0.6rem; border-radius: 6px;">BETA</span>
           </h5>
          <small class="text-muted" style="font-size: 0.8rem;">Assistant IA Avancé - Attijari Bank Tunisie</small>
        </div>
      </div>
      <div class="d-flex gap-2 pe-2">
         <button class="btn btn-light rounded-circle"><i class="bi bi-three-dots-vertical"></i></button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages flex-grow-1 p-4 overflow-auto" #scrollMe>
      <div *ngIf="messages.length === 1" class="text-center mt-5 mb-4 text-muted fade-in">
        <i class="bi bi-chat-quote fs-1 text-primary opacity-25 mb-3 d-block"></i>
        <p class="fs-5">Posez une question pour commencer.</p>
      </div>

      <div *ngFor="let msg of messages" class="message-wrapper mb-4 d-flex" [ngClass]="{'justify-content-end': msg.sender === 'user'}">
        <!-- Bot Avatar -->
        <div *ngIf="msg.sender === 'bot'" class="me-3 mt-auto">
           <div class="chatbot-avatar text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 shadow-sm" style="width: 38px; height: 38px;">
             <i class="bi bi-robot"></i>
           </div>
        </div>

        <div class="message-bubble p-3 shadow-sm fade-in"
             [ngClass]="msg.sender === 'user' ? 'bg-primary text-white rounded-4 rounded-bottom-0 ms-4' : 'bg-white text-dark rounded-4 rounded-bottom-0 border me-4'">
          <p class="m-0 lh-base" style="font-size: 0.95rem;">{{ msg.text }}</p>
          <span class="d-block mt-2 text-end" [ngClass]="msg.sender === 'user' ? 'text-white-50' : 'text-muted'" style="font-size: 0.7rem;">
            {{ msg.time | date:'HH:mm' }}
          </span>
        </div>

        <!-- User Avatar -->
        <div *ngIf="msg.sender === 'user'" class="ms-3 mt-auto">
           <div class="bg-secondary bg-opacity-25 text-dark rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 shadow-sm border border-white" style="width: 38px; height: 38px;">
             <i class="bi bi-person-fill"></i>
           </div>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div *ngIf="isTyping" class="message-wrapper mb-4 d-flex fade-in">
        <div class="me-3 mt-auto">
           <div class="chatbot-avatar text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 shadow-sm" style="width: 38px; height: 38px;">
             <i class="bi bi-robot"></i>
           </div>
        </div>
        <div class="bg-white border rounded-4 rounded-bottom-0 px-3 shadow-sm me-4 typing-indicator-bubble d-flex align-items-center">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area p-3 bg-white border-top z-1 rounded-bottom-4 shadow-sm">
      <div class="container-fluid px-0">
        <div class="input-group input-group-lg bg-light rounded-pill border p-1" style="transition: all 0.3s;" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.05)'" onmouseout="this.style.boxShadow='none'">
          <input type="text" class="form-control border-0 bg-transparent ps-4 text-dark"
                 placeholder="Message chatAbt..."
                 [(ngModel)]="userInput"
                 (keyup.enter)="sendMessage()"
                 [disabled]="isTyping"
                 style="box-shadow: none; font-size: 1rem;">
          <button class="btn btn-primary rounded-circle m-1 d-flex align-items-center justify-content-center"
                  style="width: 45px; height: 45px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(13,110,253,0.3);"
                  (click)="sendMessage()"
                  [disabled]="!userInput.trim() || isTyping">
            <i class="bi bi-send-fill fs-5"></i>
          </button>
        </div>
        <div class="text-center mt-2">
           <small class="text-muted" style="font-size: 11px;">chatAbt peut faire des erreurs. Renseignez-vous toujours auprès d'un superviseur RH/IT pour les décisions critiques.</small>
        </div>
      </div>
    </div>
  </div>
</div>
