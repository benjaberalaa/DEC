<div class="container-fluid py-4 px-4 overflow-auto">
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 p-4 sticky-top" style="top: 80px;">
        <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-person-plus-fill me-2"></i> Nouvel Utilisateur</h4>
        <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted text-uppercase">Nom d'utilisateur</label>
            <input type="text" formControlName="username" class="form-control" placeholder="user_name"
                   [ngClass]="{ 'is-invalid': (submitted || userForm.get('username')?.touched) && userForm.get('username')?.errors }">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted text-uppercase">Mot de passe</label>
            <input type="password" formControlName="password" class="form-control" placeholder="••••••••"
                   [ngClass]="{ 'is-invalid': (submitted || userForm.get('password')?.touched) && userForm.get('password')?.errors }">
          </div>
          <div class="mb-4">
            <label class="form-label small fw-bold text-muted text-uppercase">Rôle</label>
            <select formControlName="role" class="form-select">
              <option value="ROLE_USER">Utilisateur (Saisie)</option>
              <option value="ROLE_AUDIT">Auditeur (Lecture)</option>
              <option value="ROLE_ADMIN">Administrateur (Total)</option>
            </select>
          </div>

          <div *ngIf="message" class="alert alert-info py-2 small mb-3">
            {{ message }}
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="loading">
             <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
             Créer le compte
          </button>
        </form>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-0 py-3 px-4 d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold"><i class="bi bi-people-fill text-muted me-2"></i> Liste des Utilisateurs</h5>
            <span class="badge bg-light text-primary border rounded-pill px-3">{{ users.length }} utilisateurs</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-light text-muted small text-uppercase fw-bold">
              <tr>
                <th class="ps-4">Identifiant</th>
                <th>Rôle</th>
                <th>Rôle Badge</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let user of users">
                <td class="ps-4 fw-bold text-dark">{{ user.username }}</td>
                <td>{{ user.role === 'ROLE_ADMIN' ? 'Administrateur' : (user.role === 'ROLE_AUDIT' ? 'Auditeur' : 'Utilisateur') }}</td>
                <td>
                  <span class="badge rounded-pill px-3 py-2" [ngClass]="user.role === 'ROLE_ADMIN' ? 'bg-danger-subtle text-danger' : (user.role === 'ROLE_AUDIT' ? 'bg-primary-subtle text-primary' : 'bg-success-subtle text-success')">
                    {{ user.role }}
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
