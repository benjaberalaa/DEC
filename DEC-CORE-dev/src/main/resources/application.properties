spring.application.name=DECCore

# Configuration de la base de donnees Oracle
spring.datasource.url=jdbc:oracle:thin:@37.187.250.163:1521/ORCLPDB1
spring.datasource.username=usr_dcl
spring.datasource.password=usr_dcl

# Hibernate/JPA - Creation de la table si elle nexiste pas
spring.jpa.hibernate.ddl-auto=update

# Dialecte Oracle pour Hibernate 6
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Affichage des requetes SQL pour debogage
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# sessions et timeout
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
